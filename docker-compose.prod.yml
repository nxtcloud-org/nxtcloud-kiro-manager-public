services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
